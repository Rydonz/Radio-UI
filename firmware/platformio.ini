[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
lib_deps =
    olikraus/U8g2@^2.35.19
    ; pinned — 1.8.11 (git HEAD) fails to compile ('min' not declared); 1.8.9 is known-good
    https://github.com/pschatzmann/ESP32-A2DP.git#4783cf6dfe107d00873f5883d3350de1981f253b
; local flashing over the air (needs the unit in OTA mode on the hotspot)
upload_protocol = espota
upload_port = delsol-radio.local
